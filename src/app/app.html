@if (!auth.isAuthenticated()) {
  <app-splash />
} @else {
  <nav class="app-nav">
    <a routerLink="/" class="nav-brand">
      <img src="/img/escudo.png" alt="J&H" class="nav-escudo">
      <span class="nav-brand-text">J <span class="nav-ampersand">&</span> H</span>
    </a>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link nav-link-home">
        {{ i18n.T().nav.home }}
      </a>
      <a routerLink="/galeria" routerLinkActive="active" class="nav-link">
        <i class="pi pi-images"></i> <span class="nav-link-label">{{ i18n.T().nav.gallery }}</span>
      </a>
      <a routerLink="/media" routerLinkActive="active" class="nav-link nav-link-media">
        <i class="pi pi-camera"></i> {{ i18n.T().nav.photos }}
      </a>
      <button class="nav-inv-btn" (click)="auth.invitacioOberta.set(true)">
        <i class="pi pi-envelope"></i>
        <span>{{ i18n.T().nav.myInvitation }}</span>
      </button>
      @if (auth.isAdmin()) {
        <div class="nav-admin-group">
          <a routerLink="/admin/invitados" routerLinkActive="admin-active" class="nav-admin-link">
            <i class="pi pi-users"></i>
          </a>
          <a routerLink="/admin/fotos" routerLinkActive="admin-active" class="nav-admin-link">
            <i class="pi pi-images"></i>
          </a>
        </div>
      }
      <button class="nav-logout-btn" (click)="auth.logout()" title="Tancar sessió">
        <i class="pi pi-sign-out"></i>
      </button>
      <div class="lang-switcher">
        <button class="lang-btn" [class.active]="i18n.lang() === 'ca'" (click)="setLang('ca')">CA</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" [class.active]="i18n.lang() === 'es'" (click)="setLang('es')">ES</button>
      </div>
    </div>
  </nav>

  <router-outlet />

  @if (auth.invitacioOberta()) {
    <app-invitacion />
  }
}
