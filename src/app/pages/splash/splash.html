<!-- Language switcher -->
<div class="lang-switcher-splash">
  <button
    class="lang-btn"
    [class.active]="i18n.lang() === 'ca'"
    (click)="setLang('ca')"><img src="/img/flag-ca.svg" class="lang-flag" alt="CA"> CA</button>
  <span class="lang-sep">|</span>
  <button
    class="lang-btn"
    [class.active]="i18n.lang() === 'es'"
    (click)="setLang('es')"><img src="/img/flag-es.png" class="lang-flag" alt="ES"> ES</button>
</div>

<!-- Main content -->
<div class="splash-content">

  <!-- Escudo -->
  <div class="escudo-wrapper" [class.shake]="shake()">
    <div class="escudo-glow"></div>
    <img src="/img/escudo.png" alt="Escudo Judit i Héctor" class="escudo-img">
  </div>

  <!-- Tagline -->
  <div class="splash-tagline-wrap">
    <span class="splash-tagline-line"></span>
    <h1 class="splash-tagline">{{ i18n.T().splash.tagline }}</h1>
    <span class="splash-tagline-line"></span>
  </div>

  <p class="splash-subtitle">
    {{ i18n.T().splash.subtitle }}
    <strong>Judit &amp; Héctor</strong>
  </p>

  <!-- Codi form -->
  <div class="splash-form" [class.shake]="shake()">
    <div class="input-wrap">
      <i class="pi pi-ticket input-icon"></i>
      <input
        type="text"
        class="splash-input"
        [class.error]="error()"
        [placeholder]="i18n.T().splash.passwordPlaceholder"
        [(ngModel)]="codigo"
        (keydown)="onKeydown($event)"
        autocomplete="off"
        autocapitalize="characters"
      >
    </div>

    @if (error()) {
      <p class="splash-error">{{ error() }}</p>
    }

    <button class="splash-btn" (click)="submit()" [disabled]="loading()">
      @if (loading()) {
        <i class="pi pi-spin pi-spinner"></i> {{ i18n.T().splash.searching }}
      } @else {
        {{ i18n.T().splash.enter }}
        <i class="pi pi-arrow-right"></i>
      }
    </button>
  </div>

  <!-- FCB motto -->
  <p class="splash-motto">L'AMOR ENS UNEIX I ENS FA FORTS</p>
</div>
